<script>
function filterCategory(cat){
let products = document.querySelectorAll('.product');
products.forEach(p => {
if(cat === 'all'){
p.style.display = 'inline-block';
} else {
p.style.display = p.getAttribute('data-category') === cat ? 'inline-block' : 'none';
}
});
}
</script>
