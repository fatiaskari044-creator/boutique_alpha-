<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوتیک آلفا</title>

<style>

body{
margin:0;
padding:0;
font-family:tahoma;
direction:rtl;
background:#f7f3f0;
text-align:center;
}

/* لوگو پس‌زمینه */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://i.ibb.co/gZxQrVRx/IMG-20260703-001703-903.jpg");
background-repeat:no-repeat;
background-position:center;
background-size:caver;
opacity:0.22;
pointer-events:none;
z-index:-1;
}

/* هدر */
header{
background:#3b2f2f;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* محصولات */
.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.product{
width:260px;
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* دکمه */
button{
background:#6b4f4f;
color:white;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#4a3636;
}

/* سبد خرید */
.cart{
position:fixed;
top:15px;
right:15px;
background:#3b2f2f;
color:white;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
z-index:999;
}

/* فوتر */
.footer{
background:#3b2f2f;
color:white;
padding:20px;
margin-top:30px;
}

.footer a{
color:#ffddc1;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<header>
🛍 بوتیک آلفا
</header>

<!-- سبد خرید -->
<div class="cart" onclick="showCart()">
🛒 <span id="cartCount">0</span>
</div>

<!-- محصولات -->
<div class="products">

<div class="product">
<h3>تیشرت فلفلی</h3>
<img src="https://i.ibb.co/kst7qBTR/filename.jpg" width="300">
<p>قیمت: 998000 تومان</p>
<button onclick="addToCart('تیشرت فلفلی',998000)">➕ افزودن به سبد</button>
</div>
 <div class="product">
<h3>شومیز شیشه‌ای</h3>
<img src="https://i.ibb.co/chP3frX9/filename.jpg"" width="300">
<p>قیمت: 1750000 تومان</p>
<button onclick="addToCart('شومیز شیشه‌ای',1750000)">➕ افزودن به سبد</button>
</div>

</div>

<!-- فوتر -->
<div class="footer">
<p>📞 09375294372</p>
<p>📍 ماهشهر، ایران</p>
<p>📸 <a href="https://instagram.com/boutique_alphaa_" target="_blank">@boutique_alphaa_</a></p>
</div>

<script>

let cart = [];

function addToCart(name, price){
cart.push({name, price});
document.getElementById("cartCount").innerText = cart.length;
alert(name + " اضافه شد 🛒");
}

function showCart(){

if(cart.length === 0){
alert("سبد خرید خالیه");
return;
}

let message = "🛒 سفارش جدید:%0A";
let total = 0;

cart.forEach((item, i) => {
message += (i+1) + "- " + item.name + " - " + item.price + " تومان%0A";
total += item.price;
});

message += "%0A💰 مجموع: " + total + " تومان";

window.open("https://wa.me/989375294372?text=" + message, "_blank");
}

</script>

</body>
</html>
