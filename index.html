 <script>
let cart = [];

function addToCart(name, price){
cart.push({name, price});
document.getElementById("cartCount").innerText = cart.length;
alert(name + " اضافه شد 🛒");
}

function showCart(){

if(cart.length === 0){
alert("سبد خرید خالیه");
return;
}

let message = "🛒 سفارش جدید:%0A";
let total = 0;

cart.forEach((item, i) => {
message += (i+1) + "- " + item.name + " - " + item.price + " تومان%0A";
total += item.price;
});

message += "%0A💰 مجموع: " + total + " تومان";

window.open("https://wa.me/989375294372?text=" + message, "_blank");
}
</script>

<script>
function filterCategory(cat){
let products = document.querySelectorAll('.product');
products.forEach(p => {
if(cat === 'all'){
p.style.display = 'inline-block';
} else {
p.style.display = p.getAttribute('data-category') === cat ? 'inline-block' : 'none';
}
});
}
</script>
 <script>
